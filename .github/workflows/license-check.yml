name: License Compliance Check

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  license-check:
    runs-on: ubuntu-latest
    name: Check Dependency Licenses

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run license checker
        id: license-check
        run: npm run license-check
        continue-on-error: true

      - name: Comment on PR if issues found
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚠️ **License Compliance Check**\n\nSome dependencies may have license compliance issues. Please review the workflow logs and ensure all licenses are approved.\n\nApproved licenses: MIT, Apache-2.0, BSD-3-Clause, ISC, OFL-1.1\n\nFor details, see [LICENSE](../../LICENSE) and [CONTRIBUTING.md](../../CONTRIBUTING.md)`
            })

      - name: Display results summary
        if: always()
        run: |
          echo "## License Check Results" >> $GITHUB_STEP_SUMMARY
          echo "Production dependencies checked for license compliance" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Approved licenses:" >> $GITHUB_STEP_SUMMARY
          echo "- MIT" >> $GITHUB_STEP_SUMMARY
          echo "- Apache-2.0" >> $GITHUB_STEP_SUMMARY
          echo "- BSD-3-Clause" >> $GITHUB_STEP_SUMMARY
          echo "- ISC" >> $GITHUB_STEP_SUMMARY
          echo "- OFL-1.1" >> $GITHUB_STEP_SUMMARY
